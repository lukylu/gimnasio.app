<div class="modal-overlay open" (click)="onOverlay($event)">
  <div class="confirm-modal">
    <div class="confirm-icon">✅</div>
    <div class="confirm-title">¡Confirmado!</div>
    <div class="confirm-text">{{ subtitle() }}</div>

    @if (r()) {
      <div class="confirm-detail">
        <div style="color:var(--accent);margin-bottom:8px;letter-spacing:2px">RECIBO DE PAGO</div>
        @for (line of lines(); track $index) { <div>{{ line }}</div> }
        <div style="border-top:1px solid var(--border);margin:10px 0"></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Importe:</span><span style="color:var(--accent)">{{ r()!.ctx.price }}€{{ suffix() }}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Tarjeta:</span><span>•••• {{ r()!.last4 }}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Fecha:</span><span>{{ r()!.date }}</span></div>
        <div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">Ref:</span><span style="font-size:0.6rem;color:var(--muted)">{{ r()!.txId }}</span></div>
      </div>
    }

    <div class="confirm-actions">
      <button class="btn-cancel" (click)="ui.showSuccess.set(false)">Cerrar</button>
      <button class="btn-confirm" (click)="ui.showSuccess.set(false);ui.showPanel.set(true)">Ver mis reservas →</button>
    </div>
  </div>
</div>
